<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Qvebra</title>
  <link rel="stylesheet" href="users.css">
</head>
<body>

  <section class="login-container">

    <h1>INICIAR SESSÃO</h1>
    <p class="breadcrumb">Inicio . Minha conta . Login</p>
    <p class="email-contato">contato@qvebra.com.br</p>

    <form id="loginForm">

      <label>E-mail</label>
      <input type="email" id="email" placeholder="ex.: seuemail@gmail.com" required>

      <label>Senha</label>
      <input type="password" id="senha" placeholder="ex.: suasenha" required>

      <button type="submit">Iniciar sessão</button>

      <p class="criar-conta">
        Não possui sua conta ainda?
        <a href="./cadastro.html">Criar uma conta</a></p>

    </form>

  </section>

<script src="users.js" defer></script>
</body>
</html>
